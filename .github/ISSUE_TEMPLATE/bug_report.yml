name: Bug Report
description: Report a bug in ROE Gate
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: ROE Gate Version
      description: "Run `roe-gate info` or check pyproject.toml"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: "Run `python3 --version`"
      placeholder: "3.12.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (RHEL/Fedora)
        - Linux (Other)
        - Windows
        - WSL
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of ROE Gate is affected?
      options:
        - Gate Service (rule engine / evaluation)
        - Judge LLM
        - Cryptographic Signing / Token Verification
        - Tool Executor
        - MCP Server
        - Claude Code Integration (PreToolUse hook)
        - ROE Specification Parsing
        - CLI (`roe-gate` command)
        - Dashboard
        - ROE Creator
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Create ROE file with ...
        2. Run `roe-gate pentest --roe ...`
        3. Agent attempts ...
        4. Error occurs ...
    validations:
      required: true

  - type: textarea
    id: roe-snippet
    attributes:
      label: ROE Specification (relevant excerpt)
      description: If applicable, paste the relevant portion of your ROE YAML (redact sensitive data).
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste relevant logs or error messages.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information that might help (LLM provider, model, network setup, etc.)
